<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6600;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dnaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CCFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#logoGrad)" opacity="0.1"/>
  <circle cx="200" cy="200" r="160" fill="white" stroke="url(#logoGrad)" stroke-width="4"/>
  
  <!-- DNA Double Helix -->
  <g transform="translate(200, 200)">
    <!-- Strand 1 -->
    <path d="M -60 -80 Q -30 -40, -60 0 Q -90 40, -60 80" 
          fill="none" 
          stroke="url(#dnaGrad)" 
          stroke-width="8" 
          stroke-linecap="round"
          filter="url(#glow)"/>
    
    <!-- Strand 2 -->
    <path d="M 60 -80 Q 30 -40, 60 0 Q 90 40, 60 80" 
          fill="none" 
          stroke="#FF6600" 
          stroke-width="8" 
          stroke-linecap="round"
          filter="url(#glow)"/>
    
    <!-- Base Pairs -->
    <line x1="-52" y1="-60" x2="52" y2="-60" stroke="#0066CC" stroke-width="4" opacity="0.6"/>
    <line x1="-45" y1="-30" x2="45" y2="-30" stroke="#FF6600" stroke-width="4" opacity="0.6"/>
    <line x1="-52" y1="0" x2="52" y2="0" stroke="#0066CC" stroke-width="4" opacity="0.6"/>
    <line x1="-45" y1="30" x2="45" y2="30" stroke="#FF6600" stroke-width="4" opacity="0.6"/>
    <line x1="-52" y1="60" x2="52" y2="60" stroke="#0066CC" stroke-width="4" opacity="0.6"/>
    
    <!-- Base Pair Connectors (A-T, G-C representation) -->
    <circle cx="-30" cy="-60" r="6" fill="#0066CC"/>
    <circle cx="30" cy="-60" r="6" fill="#FF6600"/>
    <circle cx="-25" cy="-30" r="6" fill="#FF6600"/>
    <circle cx="25" cy="-30" r="6" fill="#0066CC"/>
    <circle cx="-30" cy="0" r="6" fill="#0066CC"/>
    <circle cx="30" cy="0" r="6" fill="#FF6600"/>
    <circle cx="-25" cy="30" r="6" fill="#FF6600"/>
    <circle cx="25" cy="30" r="6" fill="#0066CC"/>
    <circle cx="-30" cy="60" r="6" fill="#0066CC"/>
    <circle cx="30" cy="60" r="6" fill="#FF6600"/>
  </g>
  
  <!-- Magnifying Glass (Annotation) -->
  <g transform="translate(280, 120)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#003366" stroke-width="6"/>
    <line x1="25" y1="25" x2="50" y2="50" stroke="#003366" stroke-width="8" stroke-linecap="round"/>
    <!-- Inner details -->
    <circle cx="0" cy="0" r="25" fill="#E6F2FF" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="16" fill="#003366" font-weight="bold">A</text>
  </g>
  
  <!-- PUC Text -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#003366">
    PUC MINAS
  </text>
  
  <!-- Bakta Text -->
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FF6600">
    BAKTA
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">
    Genome Annotation Platform
  </text>
  
  <!-- Outer Ring Dots (representing data points/features) -->
  <g fill="#0066CC">
    <circle cx="200" cy="35" r="4"/>
    <circle cx="200" cy="365" r="4"/>
    <circle cx="35" cy="200" r="4"/>
    <circle cx="365" cy="200" r="4"/>
    <circle cx="85" cy="85" r="3" opacity="0.6"/>
    <circle cx="315" cy="85" r="3" opacity="0.6"/>
    <circle cx="85" cy="315" r="3" opacity="0.6"/>
    <circle cx="315" cy="315" r="3" opacity="0.6"/>
  </g>
</svg>
